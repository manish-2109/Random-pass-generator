<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>

</head>
<body>
    <style>
    * {
       margin: 0;
       padding: 0;
       font-family: 'Poppins', sans-serif;
       box-sizing: border-box;
    }
     body{
          background: #003e65;
          color: #fff;
}
    .container{
               margin: 12%;
               width: 90%;
               max-width: 700px;
}

    .display{
             width: 100%;
             margin-top: 50px;
             margin-bottom: 30px;
             background: #fff;
             color: #333;
             display: flex;
             align-items: center;
             justify-content: space-between;
             padding: 26px 20px;
             border-radius: 5px;
}
    .container h1{
                  font-weight: 500;
                  font-size: 45px;
}
    .container h1 span{
                       color: #019f55;
                       border-bottom: 4px solid #019f55;
                       padding-bottom: 7px;
}
    .display img{
                 width: 30px;
                 cursor: pointer;
}
    .display input{
                   border: 0;
                   outline: 0;
                   font-size: 24px;
}
    .container button img{
                          width: 28px;
                          margin-right: 10px;
}
    .container button{
                      border: 0;
                      outline: 0;
                      background: #019f55;
                      color: #fff;
                      font-size: 22px;
                      font-weight: 300;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 16px 26px;
                      border-radius: 5px;
                      cursor: pointer;
}
</style>


        <div class="container">
        <h1>Generate a <br><span>Password</span></h1>

        <div class="display">
        <input type="text" id="password" placeholder="Password" readonly>
        <img src="copy.jpg" alt="Copy" onclick="copyPassword()">
</div>


<label>Password Length: <span id="lengthValue">12</span></label>
<input type="range" id="lengthSlider" min="3" max="20" value="12">


<div>
    <label><input type="checkbox" id="uppercase" checked> Uppercase</label><br>
    <label><input type="checkbox" id="lowercase" checked> Lowercase</label><br>
    <label><input type="checkbox" id="numbers" checked> Numbers</label><br>
    <label><input type="checkbox" id="symbols" checked> Symbols</label>
</div>


<div id="strength">Strength: Weak</div>

<button onclick="createPassword()">
    <img src="generate.jpg">Generate Password</button>

    <div id="strengthBar" style="height:8px; width:100%; background:#ccc; border-radius:5px; margin-top:10px;">
    <div id="bar" style="height:100%; width:0%; background:red; border-radius:5px;"></div>
</div>
</div>

<script>
       const passwordBox = document.getElementById("password");
       const lengthSlider = document.getElementById("lengthSlider");
       const lengthValue = document.getElementById("lengthValue");

       const upperCase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
       const lowerCase = "abcdefghijklmnopqrstuvwxyz";
       const number = "0123456789";
       const symbol = "@#$%^&*()_+~|}{[]></-=";


lengthSlider.oninput = function () {
    lengthValue.textContent = this.value;
};

function createPassword() {
    let length = parseInt(lengthSlider.value);

    let chars = "";
    let password = [];

    if (document.getElementById("uppercase").checked) {
        chars += upperCase;
        password.push(upperCase[Math.floor(Math.random() * upperCase.length)]);
    }
    if (document.getElementById("lowercase").checked) {
        chars += lowerCase;
        password.push(lowerCase[Math.floor(Math.random() * lowerCase.length)]);
    }
    if (document.getElementById("numbers").checked) {
        chars += number;
        password.push(number[Math.floor(Math.random() * number.length)]);
    }
    if (document.getElementById("symbols").checked) {
        chars += symbol;
        password.push(symbol[Math.floor(Math.random() * symbol.length)]);
    }

    if (chars === "") {
        alert("Select at least one option!");
        return;
    }

    while (password.length < length) {
        password.push(chars[Math.floor(Math.random() * chars.length)]);
    }

    password = password.sort(() => Math.random() - 0.5);

    passwordBox.value = password.join("");
    checkStrength(passwordBox.value);
}

function checkStrength(password) {
    let strengthText = document.getElementById("strength");

    let score = 0;

  
    if (password.length >= 6) score++;
    if (password.length >= 10) score++;
    if (password.length >= 14) score++;

    
    if (/[A-Z]/.test(password)) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;

   
    if (score <= 2) {
        strengthText.textContent = "Strength: Very Weak";
        strengthText.style.color = "#ff0000";
    } else if (score === 3) {
        strengthText.textContent = "Strength: Weak";
        strengthText.style.color = "#ff4d4d";
    } else if (score === 4) {
        strengthText.textContent = "Strength: Good";
        strengthText.style.color = "#ffa500";
    } else if (score === 5 || score === 6) {
        strengthText.textContent = "Strength: Strong";
        strengthText.style.color = "#4caf50";
    } else {
        strengthText.textContent = "Strength: Very Strong";
        strengthText.style.color = "#00e676";
    }

    let bar = document.getElementById("bar");

if (score <= 2) {
    bar.style.width = "20%";
    bar.style.background = "red";
} else if (score === 3) {
    bar.style.width = "40%";
    bar.style.background = "orange";
} else if (score === 4) {
    bar.style.width = "60%";
    bar.style.background = "#ffc107";
} else if (score <= 6) {
    bar.style.width = "80%";
    bar.style.background = "#4caf50";
} else {
    bar.style.width = "100%";
    bar.style.background = "#00e676";
}
}




function copyPassword() {
    if (passwordBox.value === "") {
        alert("Generate password first!");
        return;
    }

    navigator.clipboard.writeText(passwordBox.value);
    alert("Password copied!");
}

</script>
</body>
</html>
